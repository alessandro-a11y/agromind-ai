name: CD — Deploy to Render

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: "Deploy • Render"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render deploy — API
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}" \
            -H "Content-Type: application/json" \
            --fail-with-body

      - name: Trigger Render deploy — Frontend
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" \
            -H "Content-Type: application/json" \
            --fail-with-body

      - name: Wait for health check
        run: |
          echo "Waiting 60s for services to boot..."
          sleep 60
          curl --retry 5 --retry-delay 10 --fail \
            "${{ secrets.RENDER_API_URL }}/api/health" \
            -H "Accept: application/json"
          echo "API health check passed"
